<!DOCTYPE html>
<html>
<head>
  <title>Mini Web Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Mini Web Desktop</header>

<div class="toolbar">
  <input id="urlBox" placeholder="Enter URL or search term...">
  <button id="openBtn">Open</button>
</div>

<div class="buttons">
  <button onclick="openWindow('https://en.wikipedia.org')">Wikipedia</button>
  <button onclick="openWindow('https://example.com')">Example</button>
</div>

<div id="desktop"></div>

<script src="script.js"></script>
</body>
</html>
